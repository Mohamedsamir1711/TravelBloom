<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBloom - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <Link rel="stylesheet" href="travel_recommendation.css">
    
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-plane-departure"></i>
            TravelBloom
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
        <div class="search-container">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass" style="color: #999; margin-right: 5px;"></i>
                <input type="text" placeholder="Enter a destination or keyword">
                <button class="search-btn">Search</button>
                <button class="clear-btn">Clear</button>
            </div>
        </div>
    </header>

    <div class="layout-container">
        
        <aside class="sidebar">
            <div class="vertical-line"></div>
            <i class="fa-brands fa-twitter"></i>
            <i class="fa-brands fa-facebook-f"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-youtube"></i>
        </aside>

        <main>
            <div class="dots-decoration">
                ::::::<br>::::::<br>::::::
            </div>

            <div class="hero-content">
                <h1>Explore<br>Dream<br>Destination</h1>
                <p class="hero-desc">
                    It encourages exploration of unknown territories, embracing diverse cultures and landscapes, while pursuing the avid dreams that captivate the soul and ignites a sense of wonder.
                </p>
                <button class="book-btn">BOOK NOW</button>
            </div>
        </main>
        
    </div>
<script src="travel.js"></script>
</body>
</html>
